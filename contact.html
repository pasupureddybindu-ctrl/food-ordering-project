<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | FoodHub</title>

<link rel="stylesheet" href="css/style.css">

<style>

.contact-container{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
flex-wrap:wrap;
padding:60px 20px;
}

.contact-card{
background:#1f2937;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 0 15px rgba(255,152,0,0.3);
transition:0.3s;
}

.contact-card:hover{
transform:translateY(-10px);
}

.contact-card h2{
color:#ff9800;
margin-bottom:15px;
}

.contact-card p{
font-size:18px;
line-height:1.8;
}

.contact-form{
background:#1f2937;
padding:30px;
border-radius:20px;
width:400px;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

.contact-form button{
width:100%;
padding:12px;
background:#ff9800;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.contact-form button:hover{
background:#ff7700;
}

</style>

</head>

<body>

<nav>
<div class="logo">🍔 FoodHub</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="menu.html">Menu</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="order.html">Order</a></li>
</ul>
</nav>

<h1 class="title" style="margin-top:40px;">
Contact FoodHub
</h1>

<div class="contact-container">

<div class="contact-card">

<h2>📍 Address</h2>
<p>
Hyderabad,<br>
Telangana,<br>
India
</p>

<br>

<h2>📞 Phone</h2>
<p>+91 9876543210</p>

<br>

<h2>📧 Email</h2>
<p>foodhub@gmail.com</p>

<br>

<h2>🕒 Working Hours</h2>
<p>10:00 AM - 11:00 PM</p>

</div>

<div class="contact-form">

<h2 style="color:#ff9800;text-align:center;">
Send Message
</h2>

<form>

<input
type="text"
placeholder="Your Name"
required>

<input
type="email"
placeholder="Your Email"
required>

<textarea
rows="6"
placeholder="Write Your Message..."
required>
</textarea>

<button type="submit">
Send Message
</button>

</form>

</div>

</div>

</body>
</html>
